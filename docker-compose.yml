services:
  db:
    image: postgres:16-alpine
    container_name: translation-backend-db
    restart: always
    environment:
      POSTGRES_USER: backend_user
      POSTGRES_PASSWORD: backend_pass
      POSTGRES_DB: translation_backend
    ports:
      - "5438:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: .
    container_name: translation-backend
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://backend_user:backend_pass@db:5432/translation_backend
    depends_on:
      - db
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  pgdata:
