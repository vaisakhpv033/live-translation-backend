server {
    listen 80;
    server_name _; # Replace with your domain name or server IP address in production

    # Security Headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Content-Security-Policy "default-src 'self' http: https: ws: wss: data: blob: 'unsafe-inline'; frame-ancestors 'none';" always;

    # Static files for the React Frontend
    location / {
        root /var/www/translation-agent-frontend;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Cache Control for static assets (Vite builds)
    location /assets/ {
        root /var/www/translation-agent-frontend;
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }

    # Reverse proxy for FastAPI backend REST API
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeout settings
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Health check endpoint
    location /health {
        proxy_pass http://127.0.0.1:8000/health;
        proxy_set_header Host $host;
    }
}
